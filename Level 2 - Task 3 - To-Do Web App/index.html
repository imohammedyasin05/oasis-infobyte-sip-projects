<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow | Intelligent Task Management</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <i data-lucide="check-circle" class="logo-icon"></i>
                <span>TaskFlow</span>
            </div>
            
            <nav class="filters">
                <button class="filter-btn active" data-filter="all">
                    <i data-lucide="layers"></i> All Tasks
                </button>
                <button class="filter-btn" data-filter="pending">
                    <i data-lucide="clock"></i> Pending
                </button>
                <button class="filter-btn" data-filter="completed">
                    <i data-lucide="check-square"></i> Completed
                </button>
            </nav>

            <div class="stats-card">
                <h3>Daily Progress</h3>
                <div class="progress-ring-container">
                    <svg class="progress-ring" width="120" height="120">
                        <circle class="progress-ring__circle" stroke="#e2e8f0" stroke-width="8" fill="transparent" r="52" cx="60" cy="60"/>
                        <circle class="progress-ring__circle-fill" id="progressCircle" stroke="#6366f1" stroke-width="8" stroke-linecap="round" fill="transparent" r="52" cx="60" cy="60"/>
                    </svg>
                    <div class="progress-text">
                        <span id="percentComplete">0%</span>
                    </div>
                </div>
                <p id="statsSummary">0 of 0 tasks done</p>
            </div>
        </aside>

        <main class="main-content">
            <header class="header">
                <div class="welcome">
                    <h1 id="greeting">Hello, Developer!</h1>
                    <p id="currentDate">Wednesday, May 3</p>
                </div>
                <button class="theme-toggle" id="themeToggle">
                    <i data-lucide="moon"></i>
                </button>
            </header>

            <section class="task-input-section">
                <form id="taskForm" class="task-form">
                    <div class="input-wrapper">
                        <input type="text" id="taskInput" placeholder="What needs to be done?" required>
                        <select id="taskPriority">
                            <option value="low">Low</option>
                            <option value="medium" selected>Medium</option>
                            <option value="high">High</option>
                        </select>
                        <button type="submit" class="add-btn">
                            <i data-lucide="plus"></i>
                        </button>
                    </div>
                </form>
            </section>

            <section class="task-list-section">
                <div class="section-header">
                    <h2 id="listTitle">All Tasks</h2>
                    <span class="count-badge" id="taskCount">0</span>
                </div>
                <div id="taskList" class="task-list">
                    <!-- Tasks will be injected here -->
                </div>
                
                <div id="emptyState" class="empty-state">
                    <i data-lucide="clipboard-list"></i>
                    <p>No tasks found. Start by adding one!</p>
                </div>
            </section>
        </main>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3>Edit Task</h3>
            <input type="text" id="editTaskInput">
            <div class="modal-actions">
                <button id="cancelEdit" class="btn-text">Cancel</button>
                <button id="saveEdit" class="btn-primary">Save Changes</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
